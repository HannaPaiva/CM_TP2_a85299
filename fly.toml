app = "tp2-cm-solitaire"
primary_region = "mad"

kill_signal = "SIGINT"
kill_timeout = 5

[build]

[env]
  FLET_SERVER_PORT = "8080"
  FLET_FORCE_WEB_SERVER = "true"

[experimental]
  auto_rollback = true

[[services]]
  internal_port = 8080
  protocol = "tcp"

  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[services.ports]]
    handlers = ["http"]
    port = 80
    force_https = true

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "1s"
    restart_limit = 0
